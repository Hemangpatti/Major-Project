<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin - Users</title>
  <style>body{font-family:Segoe UI;padding:20px}table{width:100%;border-collapse:collapse}th,td{padding:10px;border:1px solid #ddd}</style>
</head>
<body>
  <h1>Users</h1>
  <a href="{{ url_for('admin_dashboard') }}">Back</a>
  <table>
    <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Locked</th><th>Actions</th></tr>
    {% for u in users %}
    <tr>
      <td>{{ u.id }}</td>
      <td>{{ u.username }}</td>
      <td>{{ u.email }}</td>
      <td>{{ u.role }}</td>
      <td>{{ 'Yes' if u.is_locked else 'No' }}</td>
      <td>
        <form method="post" action="/admin/unlock/{{ u.id }}">
          <button type="submit">Unlock</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </table>
</body>
</html>
