<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SHAP Explanation</title>
  <style>
    body { font-family: Segoe UI, sans-serif; padding: 20px; background: #f5f7fa; }
    .card { max-width: 900px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    h1 { margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    th { color: #333; }
    .empty { color: #666; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Feature Contributions</h1>
    {% if shap %}
      <table>
        <tr><th>Feature</th><th>Contribution</th></tr>
        {% for feature, value in shap.items() %}
        <tr>
          <td>{{ feature }}</td>
          <td>{{ '%.6f'|format(value) }}</td>
        </tr>
        {% endfor %}
      </table>
    {% else %}
      <p class="empty">No SHAP data available.</p>
    {% endif %}
  </div>
</body>
</html>
